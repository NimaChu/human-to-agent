name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen --all-groups
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src tests
      - run: uv run python -m human_to_agent.services.schema_catalog --check schemas/v1
      - run: uv run pytest -q
      - run: uv run hta doctor --format json
      - run: uv build --out-dir build/python-dist
      - run: uv run python scripts/verify_wheel_install.py build/python-dist
      - run: git diff --exit-code
